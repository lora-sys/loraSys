                                - paragraph [ref=e634]:
                                    - text: Geist Sans is a sans-serif typeface designed for legibility and simplicity. It is a modern, geometric typeface that is based on the principles of
                                    - link "classic Swiss typography" [ref=e635] [cursor=pointer]:
                                        - /url: https://en.wikipedia.org/wiki/International_Typographic_Style
                                    - text: . It is designed to be used in headlines, logos, posters, and other large display sizes.
                                - paragraph [ref=e636]: Geist Mono is a monospaced typeface that has been crafted to be the perfect partner to Geist Sans. It is designed to be used in code editors, diagrams, terminals, and other textbased interfaces where code is represented.
                                - paragraph [ref=e637]: Geist Pixel is a pixel typeface designed to complement the Geist font family, built on the same principles of minimalism, precision, and simplicity that define the universe. Conceived as a display font, it pays homage to the pixel font genre while expressing the brand’s future-forward, visionary spirit, and is available in five stylistic variants for a wide range of applications.
